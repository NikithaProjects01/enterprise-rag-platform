services:
  - type: web
    name: enterprise-rag-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: APP_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./rag_platform.db
      - key: RATE_LIMIT_PER_MINUTE
        value: 120
      - key: FRONTEND_ORIGINS
        value: http://localhost:5173,http://127.0.0.1:5173,https://enterprise-rag-platform-coral.vercel.app
